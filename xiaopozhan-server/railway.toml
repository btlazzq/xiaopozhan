[build]
builder = "nixpacks"
buildCommand = "test -f seed-assets/music/mp3/intro.mp3 && echo 'seed-assets OK' || (echo 'seed-assets MISSING' && ls -laR seed-assets 2>/dev/null; exit 1) && npm install"

[deploy]
startCommand = "npm run start:deploy"
restartPolicyType = "on_failure"
# 首次部署数据为空时，可在 Railway Variables 设 SYNC_FORCE=1 触发一次强制同步
